<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIU Consulting — Data Engineering & Intelligence décisionnelle</title>
<meta name="description" content="LIU Consulting — Solutions data complètes livrées clé en main. Missions chez L'Oréal, Deezer, Bureau Vallée, TotalEnergies, Servier.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
/* ─── BCG DESIGN TOKENS (source: CSS BCG analysé) ─── */
:root {
  /* BCG exact colors */
  --black:    #212427;
  --charcoal: #232326;
  --white:    #ffffff;
  --beige:    #F1EEEA;   /* --neutral-200 BCG */
  --gray-200: #F2F2F2;
  --gray-300: #D4D4D4;  /* --headerBorderColor BCG */

  /* LIU Consulting: jaune remplace le vert BCG */
  --y:        #E8A020;  /* = BCG --accent-200 #7EF473 */
  --y-hover:  #F5C14A;  /* = BCG --accent-300 */
  --y-dark:   #B07010;  /* = BCG --green-500 */
  --y-bg:     #FFF8E0;  /* = BCG --green-200 #DCF9E3 */
  --navy:     #00296B;  /* = BCG --green-700 #0E3E1B */
  --navy-2:   #003F88;

  /* BCG exact nav values */
  --header-h:     56px;
  --nav-margin:   16px;
  --nav-radius:   20px;   /* --headerRadius BCG */
  --nav-bg:       hsla(0,0%,100%,0.7);  /* --translucent-white BCG */
  --nav-shadow:   0px 1px 2px rgba(0,0,0,.12), 0px 2px 6px rgba(0,0,0,.08);  /* --box-shadow BCG */

  /* BCG exact spacing */
  --sp-v: 32px;    /* section padding vertical mobile */
  --sp-h: 16px;    /* section padding horizontal mobile */

  /* BCG card/button radius */
  --r-card: 20px;   /* Promo22 */
  --r-media: 30px;  /* Promo-media images */
  --r-btn: 15px;    /* primary-button */
}

@media(min-width:768px){
  :root { --header-h:64px; --nav-margin:32px; --sp-v:40px; --sp-h:40px; }
}
@media(min-width:1024px){
  :root { --sp-v:56px; }
}
@media(min-width:1440px){
  :root { --header-h:72px; --nav-margin:80px; --sp-v:72px; --sp-h:80px; }
}

/* ─── RESET ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',Arial,'Helvetica Neue',sans-serif;color:var(--black);background:var(--white);overflow-x:hidden;font-size:16px;font-weight:300;line-height:1.6}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* ─── CONTAINER ─── */
.wrap{max-width:1440px;margin:0 auto;padding:0 var(--sp-h)}

/* ─── SECTION BASE (BCG [data-module]) ─── */
.section{padding:var(--sp-v) var(--sp-h)}
@media(min-width:1440px){.section{padding:var(--sp-v) var(--sp-h)}}

/* ─── NAV BCG : DEUX PASTILLES SÉPARÉES ─── */
/* BCG structure: Page-headerMenuLeft + Page-headerMenuRight flottants */
#nav{
  position:fixed;top:0;left:0;right:0;
  z-index:900;
  height:var(--header-h);
  margin:var(--nav-margin);
  display:flex;align-items:center;justify-content:flex-end;
  pointer-events:none;
}
.nav-left,.nav-right{
  pointer-events:all;
  display:flex;align-items:center;gap:0;
  height:var(--header-h);
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:var(--nav-radius);
  box-shadow:var(--nav-shadow);
}
.nav-left{padding:0 20px;gap:10px}
.nav-right{padding:0 6px 0 20px;gap:28px}
.nav-logo-dot{width:7px;height:7px;background:var(--y);border-radius:50%;flex-shrink:0}
.nav-logo-text{font-size:.8rem;font-weight:600;color:var(--black);letter-spacing:.05em}
.nav-link{font-size:.82rem;font-weight:400;color:var(--black);opacity:.65;transition:opacity .2s}
.nav-link:hover{opacity:1}
.nav-cta{
  background:var(--y);color:var(--black);
  padding:10px 20px;
  font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  border-radius:var(--nav-radius);
  transition:background .2s;
  margin:6px;
}
.nav-cta:hover{background:var(--y-hover)}

/* ─── HERO — multi-cubes ─── */
#hero{
  position:relative;height:100vh;overflow:hidden;
  background:#E8A020;
  display:flex;flex-direction:column;
}
/* Overlay pour lisibilité du texte */
.hero-overlay{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:linear-gradient(
    110deg,
    rgba(0,0,0,.58) 0%,
    rgba(0,0,0,.25) 45%,
    transparent 75%
  );
}

/* ── 2 CUBES GÉANTS — fond assorti, rotation calme ── */
.cubes-bg{
  position:absolute;inset:0;
  z-index:1;pointer-events:none;
  overflow:hidden;
  perspective:1400px;
}
.cw{ position:absolute;transform-style:preserve-3d }
.cube3{ width:100%;height:100%;transform-style:preserve-3d }

/* Faces — couleur très proche du fond, arêtes quasi invisibles */
.cube3 div{
  position:absolute;width:100%;height:100%;
  border:1px solid rgba(255,240,160,.08);
}
/* Faces — gold clair, proches du fond */
.face-f { background:rgba(240,178,45,.38); transform:rotateY(0deg)   translateZ(var(--h)) }
.face-b { background:rgba(210,150,20,.25); transform:rotateX(180deg) translateZ(var(--h)) }
.face-r { background:rgba(248,192,55,.32); transform:rotateY( 90deg) translateZ(var(--h)) }
.face-l { background:rgba(215,155,28,.22); transform:rotateY(-90deg) translateZ(var(--h)) }
.face-t { background:rgba(255,205,65,.40); transform:rotateX( 90deg) translateZ(var(--h)) }
.face-bo{ background:rgba(190,130,15,.18); transform:rotateX(-90deg) translateZ(var(--h)) }
/* Reflet blanc SUR les cubes — positionné juste devant la face avant */
.face-hl{
  background:radial-gradient(ellipse 22% 18% at 35% 30%,
    rgba(255,255,255,.75) 0%,
    rgba(255,255,255,.2) 45%,
    transparent 70%);
  transform:rotateY(0deg) translateZ(calc(var(--h) + 0.5px));
  border:none !important;
  pointer-events:none;
}

/* Rotations calmes — quasi planétaires */
@keyframes calm-a{
  0%  { transform:rotateY(0deg)   rotateX( 6deg) rotateZ(0deg) }
  50% { transform:rotateY(180deg) rotateX(-4deg) rotateZ(2deg) }
  100%{ transform:rotateY(360deg) rotateX( 6deg) rotateZ(0deg) }
}
@keyframes calm-b{
  0%  { transform:rotateX(0deg)   rotateY(-5deg) rotateZ(0deg) }
  50% { transform:rotateX(180deg) rotateY( 7deg) rotateZ(-2deg) }
  100%{ transform:rotateX(360deg) rotateY(-5deg) rotateZ(0deg) }
}

/* Cube 1 — gauche-haut */
.cw1{ --s:200vmin;--h:100vmin;width:var(--s);height:var(--s);left:-30%;top:-30% }
.cw1 .cube3{ animation:calm-a 28s linear infinite }

/* Cube 2 — droite-bas, en avance de phase */
.cw2{ --s:200vmin;--h:100vmin;width:var(--s);height:var(--s);left:20%;top:10% }
.cw2 .cube3{ animation:calm-b 34s linear infinite }



/* Hero content — texte overlaid sur aurora comme BCG */
.hero-content{
  position:relative;z-index:10; /* au-dessus des cubes et de l'overlay */
  flex:1;display:flex;align-items:center;
  padding:calc(var(--header-h) + 40px) var(--sp-h) 40px;
}
.hero-text{max-width:760px}
.hero-welcome{
  display:block;
  font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
  margin-bottom:20px;
}
.hero-h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2.2rem,5vw,60px);
  font-weight:400;line-height:1.06;letter-spacing:-.025em;
  color:#fff;
  margin-bottom:24px;
  text-shadow:0 2px 24px rgba(0,0,0,.45), 0 1px 6px rgba(0,0,0,.35);
}
.hero-welcome{
  text-shadow:0 1px 10px rgba(0,0,0,.4);
}
.hero-desc{
  font-size:clamp(.9rem,1.4vw,1.1rem);
  font-weight:300;line-height:1.75;
  color:rgba(255,255,255,.9);
  max-width:520px;
  margin-bottom:40px;
  text-shadow:0 1px 10px rgba(0,0,0,.4);
}
.hero-ctas{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.btn-hero-y{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--y);color:var(--black);
  padding:14px 28px;border-radius:var(--r-btn);
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  transition:background .2s;
}
.btn-hero-y:hover{background:var(--y-hover)}
.btn-hero-ghost{
  font-size:.88rem;font-weight:300;color:rgba(255,255,255,.65);
  border-bottom:1px solid rgba(255,255,255,.28);padding-bottom:1px;
  transition:all .2s;
}
.btn-hero-ghost:hover{color:#fff;border-color:rgba(255,255,255,.7)}

/* Scroll indicator */
.hero-scroll{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding-bottom:36px;
  font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.3);
  animation:scroll-bounce 2.2s ease-in-out infinite;
}
.hero-scroll svg{width:16px;height:16px}
@keyframes scroll-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ─── SECTION WELCOME ─── */
#welcome{background:var(--white);padding:var(--sp-v) 0}
.welcome-inner{padding:0 var(--sp-h)}
.carousel-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;gap:20px;
}
.carousel-nav{display:flex;gap:8px}
.carousel-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--black);color:#fff;
  font-size:1rem;cursor:pointer;border:none;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
  pointer-events:all;
}
.carousel-btn:hover{background:var(--navy);transform:scale(1.05)}
.carousel-btn:disabled{background:var(--gray-300);cursor:default;transform:none}

/* ModuleHeader BCG exact */
.module-header{text-align:center;margin-bottom:48px}
.module-eyebrow{
  display:block;
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--black);opacity:.45;
  margin-bottom:14px;
}
@media(min-width:1440px){.module-eyebrow{font-size:14px}}
.module-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(1.6rem,3.5vw,2.8rem);
  font-weight:400;line-height:1.1;letter-spacing:-.02em;
  color:var(--black);
  max-width:800px;margin:0 auto;
}

/* Carousel Promo20 BCG exact */
.promo-carousel{
  display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;
  padding:0 var(--sp-h) 16px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.promo-carousel::-webkit-scrollbar{display:none}

.promo20{
  flex:0 0 75%;scroll-snap-align:start;
  /* BCG: 75% mobile, 50% tablet, 33% desktop */
}
@media(min-width:600px){.promo20{flex:0 0 50%}}
@media(min-width:960px){.promo20{flex:0 0 calc(33.333% - 6px)}}
@media(min-width:1440px){.promo20{flex:0 0 calc(25% - 6px)}}

/* ── Promo20 BCG exact : image fills card, text overlaid, panel slides up ── */
/* ── Promo20 : image haut (62%) + panel bas (38%), non superposés ── */
.promo20-inner{
  position:relative;
  display:flex;flex-direction:column;
  aspect-ratio:3/4;
  border-radius:var(--r-media);overflow:hidden;
  cursor:pointer;text-decoration:none;
}

/* Image — 62% de la hauteur, pas absolu */
.promo20-media{
  position:relative;
  height:62%;flex-shrink:0;
  overflow:hidden;
}
.promo20-media img{width:100%;height:100%;object-fit:cover;display:block}
.promo20-media::after{display:none}

/* promo20-vis inutile (panel toujours visible) */
.promo20-inner .promo20-vis{display:none}

/* Panel global — absolu pour promo22 (mosaic) */
.promo20-hid{
  position:absolute;
  bottom:0;left:0;right:0;
  height:38%;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  overflow:hidden;
  padding:20px 22px 22px;
  background:rgba(241,238,234,.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:0 0 var(--r-media) var(--r-media);
  z-index:3;
  transition:height .42s cubic-bezier(.25,.46,.45,.94),border-radius .42s ease;
}

/* Panel dans promo20-inner — flex, en dessous de l'image */
.promo20-inner .promo20-hid{
  position:relative;
  bottom:auto;left:auto;right:auto;
  flex:1;
  height:auto;
  opacity:1;
  border-radius:0;
  justify-content:flex-start;
  transition:none;
  z-index:1;
}

/* Hover promo22 (mosaic) */
@media(hover:hover) and (pointer:fine){
  .promo22:hover .promo20-hid{
    height:100%;border-radius:var(--r-media);justify-content:flex-start;
  }
}

/* Hover promo20-inner : panel devient absolu et couvre l'image */
@media(hover:hover) and (pointer:fine){
  .promo20-inner:hover .promo20-hid{
    position:absolute !important;
    top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;
    height:100% !important;
    flex:none;
    border-radius:var(--r-media);
    z-index:5;
    justify-content:flex-start;
  }
}
